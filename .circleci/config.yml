version: 2

defaults: &defaults
  working_directory: /tmp/project
  docker:
    - image: cimg/node:20.11
  environment:
    # Pre-install the required language file as package activation doesn't wait
    # for the installation to complete.
    PPM_TEST_PACKAGES: "language-postcss"
  steps:
    # Restore project state
    - attach_workspace:
        at: /tmp
    - run:
        name: Install system dependencies
        command: |
          sudo apt-get update
          sudo apt-get install -y \
            wget \
            gdebi-core \
            libgbm1 \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            libasound2 \
            libx11-xcb1 \
            libdrm2 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libxcomposite1 \
            xvfb
    - run:
        name: Install Pulsar (latest .deb)
        command: |
          wget -O pulsar.deb \
            https://github.com/pulsar-edit/pulsar/releases/download/v1.131.3/Linux.pulsar_1.131.3_amd64.deb
          sudo apt-get install -y ./pulsar.deb
    - run:
        name: Create VFB for Atom to run in
        command: |
          Xvfb :99 -screen 0 1280x1024x24 &
          echo "export DISPLAY=:99" >> $BASH_ENV
    - run:
        name: PPM version
        command: ppm --version
    - run:
        name: Package PPM package dependencies
        command: |
          if [ -n "${PPM_TEST_PACKAGES}" ]; then
            for pack in ${PPM_TEST_PACKAGES}; do
            ppm install "${pack}"
            done
          fi;
    - run:
        name: Package dependencies
        command: ppm install
    - run:
        name: Cleaning package
        command: ppm clean
    - run:
        name: Package specs
        command: pulsar --test spec
    # Cache node_modules
    - save_cache:
        paths:
          - node_modules
        key: v3-dependencies-{{ .Branch }}-{{ checksum "package.json" }}-{{ checksum "package-lock.json"}}

jobs:
  checkout_code:
    <<: *defaults
    docker:
      - image: circleci/node:latest
    steps:
      - checkout
      # Restore node_modules from the last build
      - restore_cache:
          keys:
          # Get latest cache for this package.json and package-lock.json
          - v3-dependencies-{{ .Branch }}-{{ checksum "package.json" }}-{{ checksum "package-lock.json"}}
          # Fallback to the current package.json
          - v3-dependencies-{{ .Branch }}-{{ checksum "package.json" }}-
          # Fallback to the last build for this branch
          - v3-dependencies-{{ .Branch }}-
          # Fallback to the last available master branch cache
          - v3-dependencies-master-
          # Don't go further down to prevent dependency issues from other branches
      # Save project state for next steps
      - persist_to_workspace:
          root: /tmp
          paths:
            - project
  lint:
    <<: *defaults
    docker:
      - image: circleci/node:latest
    steps:
      # Restore project state
      - attach_workspace:
          at: /tmp
      - run:
          name: Node.js Version
          command: node --version
      - run:
          name: NPM Version
          command: npm --version
      - run:
          name: Install any remaining dependencies
          command: npm ci
      - run:
          name: Lint code
          command: npm run lint
  test:
    <<: *defaults

workflows:
  version: 2
  test_package:
    jobs:
      - checkout_code
      - lint:
          requires:
            - checkout_code
      - test:
          requires:
            - lint
